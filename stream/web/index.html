<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blood Bowl Live</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header id="hud">
  <div class="team home" id="team-home">
    <div class="tname" id="name-home">Home</div>
    <div class="pips" id="pips-home"></div>
  </div>
  <div id="plate">
    <div id="score">0&ndash;0</div>
    <div id="half">1st Half</div>
  </div>
  <div class="team away" id="team-away">
    <div class="tname" id="name-away">Away</div>
    <div class="pips" id="pips-away"></div>
  </div>
</header>

<div id="winprob">
  <div id="winprob-home"></div>
  <div id="winprob-notch"></div>
  <span id="winprob-label">50%</span>
</div>

<main>
  <aside class="dugout" id="dugout-home"><h3>Home dugout</h3><div class="groups"></div></aside>
  <div id="pitch-wrap">
    <canvas id="pitch"></canvas>
    <div id="banner" class="hidden"></div>
  </div>
  <aside class="dugout" id="dugout-away"><h3>Away dugout</h3><div class="groups"></div></aside>
  <aside id="sidebar">
    <section class="panel hidden" id="panel-teamstats">
      <h3>Team Stats</h3>
      <div id="teamstats"></div>
    </section>
    <section class="panel" id="panel-log">
      <h3>Action Log</h3>
      <div id="actionlog"></div>
    </section>
    <section class="panel" id="panel-dice">
      <h3>Dice &amp; Odds</h3>
      <div id="dicepanel"></div>
    </section>
  </aside>
</main>

<footer>
  <span id="f-match">match: &mdash;</span>
  <span id="f-conn" class="conn-connecting">connecting&hellip;</span>
  <span id="f-rate">0.0 dec/s</span>
</footer>

<script src="app.js"></script>
</body>
</html>
