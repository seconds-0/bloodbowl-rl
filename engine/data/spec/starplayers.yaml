# BB2025 Star Players — extracted from docs/vendor/bloodbowlbase/bloodbowlbase.ru/bb2025/starplayers/
# (63 pages -> 66 entries: Dribl & Drull, Grak & Crumbleberry, The Swift Twins are pairs
#  with separate stat lines, modelled as separate entries sharing `hired_with`).
#
# Conventions (see SCHEMA.md):
#   - AG/PA/AV are target numbers (e.g. 2 means 2+); PA '-' => 0; costs in k gold.
#   - Parameterized skills/traits encode their value in the id: loner_3 / loner_4 = Loner (3+/4+),
#     bloodlust_2 = Bloodlust (2+), hatred_<keyword> = Hatred (X).
#   - `special_rule_text` is a paraphrase of the bespoke rule (no verbatim GW text).
#   - `plays_for` = the page's "Plays For" entries (team special-rule keyword groups or any_team*).
#   - `plays_for_teams` = the page's explicit "Accept to play for..." team list (resolved team ids).
#   - `keywords` = the parenthesised keyword list under the stat line.
#   - For paired stars `cost` is the COMBINED price of the pair (do not sum the two entries);
#     `hired_with` names the partner who must be hired alongside.
#   - `mega_star` per the May 2026 FAQ Mega-Stars list (core_rules/latest_faq).

