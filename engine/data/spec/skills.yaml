# BB2025 skills & traits — extracted from
# docs/vendor/bloodbowlbase/bloodbowlbase.ru/bb2025/core_rules/skills_and_traits/index.html
# (errata-current mirror, May 2026; <del> struck text ignored).
# Cross-checked against core_rules/latest_faq/index.html:
#   - Elite Skills = Block, Dodge, Guard, Mighty Blow (exactly the 4 headings carrying
#     elite_skill_small.jpg; FAQ pg.112 ruling: each may be taken up to 4x in Matched Play).
#   - Errata "Page 122 - Traits!" (Prone Special Action declaration) and
#     "Page 124 - Ball & Chain" (Chomped immunity) are already applied inline on the page.
# mode: active = usable only while Standing and not Distracted (unless the text says
# otherwise, e.g. Jump Up works while Prone); passive = always in effect.
# compulsory: asterisk (*) in the rulebook — player must use the skill/trait when applicable.
# value: default X for parameterized (X)/(X+) traits; null where the parameter is
# per-player (Bloodlust 2+/3+) or a keyword (Animosity, Hatred). No 2025 skill is parameterized.

