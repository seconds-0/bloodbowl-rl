# BB2025 team rosters — teams A (first 15 of 30, alphabetical by mirror directory).
# Source: docs/vendor/bloodbowlbase/bloodbowlbase.ru/bb2025/teams/<Team>/index.html
# (errata-current; <del> struck text ignored). Tiers from the May 2026 tier table in
# core_rules/latest_faq/index.html.
# Conventions per SCHEMA.md: AG/PA/AV are target numbers (PA '-' => 0); costs in k;
# parameterized skills/traits use {name, value} (Loner (4+) => {name: loner, value: 4}).
# Position `name` = team-prefixed snake id (display carries the exact printed name);
# big_guy mirrors the "Big Guy" keyword printed in the position's keyword list.

