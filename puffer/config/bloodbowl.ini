# Blood Bowl (BB2025) — PufferLib 4.0 training config.
# Starting point: chess.ini's tuned selfplay values where transferable,
# defaults elsewhere. Nothing here is swept yet; [sweep] comes after the
# first stable run.
[base]
env_name = bloodbowl

[selfplay]
enabled = 1
max_size = 200
# BB draws are common at low skill; demand a solid edge but not chess's 0.6.
swap_winrate = 0.55
min_games = 2048
snapshot_interval = 200_000_000
opp_timeout_steps = 500_000_000
# Heterogeneous league seeding (training/selfplay_league.patch): path to a
# pool dir built by tools/build_league.py (league_seeds.json + one flat-fp32
# .bin per frozen bank). Banks start from those checkpoints instead of
# bootstrap-clones of the learner, and run snapshots accumulate in that dir.
# Empty = upstream bootstrap behavior. Launch recipe: tools/run_league.sh.
league_preseed =

[vec]
# 2 agents per match -> 2048 concurrent matches.
total_agents = 4096
# 24-vCPU box: 2 buffers double-buffer GPU forward against env stepping;
# 10 OMP workers per buffer (docs/sps-optimization-plan.md, est. 1.5-2.7x).
num_buffers = 2
num_threads = 20
num_frozen_banks = 1
frozen_bank_pct = 0.1

[env]
seed = 1
# CLAMP CONSTRAINT (docs/rl-best-practices.md hole #1): both trainers
# hard-clamp per-step rewards to [-1, 1] (torch_pufferl.py:410,
# pufferlib.cu:1509). All knobs must keep any single step's SUM inside that
# range or the excess silently vanishes (the old win=3 trained as 1, and a
# winning TD step clamped to the same value as any TD). Worst-case stack:
# terminal winning-TD step = reward_td + reward_win <= 1.0.
reward_td = 0.4
reward_win = 0.6
# Draw: applied to BOTH sides on equal scores. -0.1 keeps Win(+0.6) >
# Draw(-0.1) >> Loss(-0.6): draw-securing stays right when behind, mutual
# stalling stays a non-equilibrium.
reward_draw = 0.0
# --- Shaping knobs (all 0 = off; the 10B baseline ran fully unshaped) ------
# Historical suggestions below explain prior experiments; they are not a safe
# launch recipe. The audited objective is TD=0.4 and win=0.6, and multiple
# terms can land on one agent-step before PPO clamps the sum to [-1,1]. New
# causal runs must use a complete puffer/config/rewards/*.json manifest plus
# tools/reward_manifest.py and monitor reward_clip_frac_nonzero.
# Setup: +0.25 / -0.25 (voluntary legal formation vs budget-exhausted autofix)
reward_setup_done = 0.0
reward_setup_autofix = 0.0
# Ball: gain +0.1, loss -0.2 (turnover ~ half a TD at the new TD scale)
reward_ball_gain = 0.0
reward_ball_loss = 0.0
# Bootstrap curriculum (plain delta-potential scaffold, not exact discounted
# PBRS at gamma=0.995; CURRICULUM ONLY —
# anneal to 0 via chained runs once scoring wakes up). Suggested stage-1:
# dist_ball 0.02/sq, dist_endzone 0.04/sq (full-pitch fetch ~0.5, full-pitch
# carry ~1.0 — a TD-scale incentive to cross the valley, never above the TD).
reward_dist_ball = 0.0
reward_dist_endzone = 0.0
# Injuries (KO/CAS): inflicted +0.15, taken -0.15
reward_injury_inflicted = 0.0
reward_injury_taken = 0.0
# 1 = scale injury rewards by victim roster cost / 100k (Mummy ~3x Skeleton)
reward_injury_value_scaled = 0
# Send-offs: one-sided own-player penalty after Bribe/Argue saves fail.
# Suggested with attrition restore: -0.15.
reward_send_off = 0.0
# Kickoff touchbacks: one-sided penalty charged to the kicking team when a
# kickoff enters touchback resolution. Suggested when enabled: negative, e.g.
# -0.05, to teach safe receiving-half placement (D145).
reward_kickoff_touchback = 0.0
# Possession annuity (the reward-chain redesign, 2026-06-06): ending your
# own team turn holding the ball pays +p / -p zero-sum. Holding = income
# stream; suggested 0.03 (full-game control ~ 0.5 ~ one TD). When using it,
# set reward_ball_loss = 0 — the loss-fine was the measured possession
# poison (rational ball-avoidance in every masked arm).
reward_possession = 0.0
# Assist potential (D163): zero-sum telescoping scaffold at settled own-turn-
# end; not exact discounted PBRS at gamma=0.995.
# Credits improving existing favorable block contacts and removing defensive
# assists through bounded adjacent-contact Phi. Suggested sweep TBD.
reward_k_assist = 0.0
# Rush (GFI) tax per square at declaration — decision-time exposure pricing
# for recklessness (under scoring scarcity the critic prices failed GFIs at
# ~zero and potentials make rushing free income). Suggested 0.01-0.02.
reward_rush_cost = 0.0
# Carrier-exposure penalties (R6v1): positive magnitudes charged via
# subtraction at settled own-turn-end when a standing carrier gives opponents
# free adjacent access (full) or exactly one dodge/GFI of access (soft).
# One-sided only; no opponent credit. Suggested 0.05 / 0.02 when enabled.
reward_carrier_exposure = 0.0
reward_carrier_exposure_soft = 0.0
# Carrier-threat annuity (R6v2, locked 2026-06-18): replaces the R6v1
# exposure knobs when enabled. Positive-positive at settled own-turn-end:
# holder gets k*(T_max-T), defender gets k*T. Mutually exclusive with the
# two reward_carrier_exposure knobs above. Suggested sweep start ~0.03.
reward_carrier_threat = 0.0
# Defensive scoring-lane threat penalties (R12v1, D133-A): the DUAL of R6v1.
# Positive magnitudes charged via subtraction at settled own-turn-end, per
# UNMITIGATED (unmarked) opposing player that can reach OUR endzone in <= 1
# (hard) or <= 2 (soft) of its own turns by raw movement (MA + max rushes).
# Per-player, ball-agnostic, O(players). One-sided. Suggested 0.05 / 0.02.
reward_defensive_threat = 0.0
reward_defensive_threat_soft = 0.0
# LEGACY / QUARANTINED aggregate-statistic matching (D114). The 2026-07-09
# audit proved its baseline mixes incompatible FUMBBL-roll and engine-decision
# semantics, uses a retired possession parser, synthetic variances, and no
# covariance/roster conditioning. Keep 0. Complete reward manifests reject a
# nonzero value; retain the code path only to reproduce historical artifacts.
reward_statmatch_scale = 0.0
# Backplay curriculum (D47): >0 = demo resets prefer states with a standing
# carrier within this many squares of their endzone (rejection-sampled), so
# touchdowns are experienced densely; expand backward in stages (6 -> 12 ->
# 0=uniform) like the k-anneal chain.
demo_endzone_maxdist = 0
# Pickup curriculum (D64): >0 = demo resets prefer states with a LOOSE ball
# within this many Chebyshev squares of a standing player of the team-to-move
# (rejection-sampled), so the scoop is experienced densely (backplay skips it
# by starting with the ball held). Expand outward in stages like backplay.
# Mutually exclusive with demo_endzone_maxdist (backplay wins if both >0).
demo_pickup_maxdist = 0
# Post-kickoff scoop drill (D68): >0 = demo resets prefer the natural game
# opening — a LOOSE ball with the team-to-move on team-turn <= N. The drill
# state IS the real game-start context, sidestepping the D67 context-lock
# failure. Bank coverage: turn-1 4,405 states (28.5%), turn-2 748. USE 2 as
# the default stage (Alex): slow teams (dwarves, MV4-5) frequently need two
# turns to reach the ball — maxturn 2 banks the mid-approach "still loose at
# turn 2" continuations so the finish gets dense reps, not just the kick.
# Precedence: endzone > pickup > postkick.
demo_postkick_maxturn = 0
# Passing ladder (D72): >0 = demo resets prefer held-ball states with a
# standing downfield receiver within this Chebyshev pass-range (a state where
# throwing is live). Pure ladder, graduate to kickoff (demo_reset_pct->0) per
# D69. ~15%% of bank qualifies at range 6. Precedence: endzone>pickup>postkick>pass.
demo_pass_maxrange = 0
# Procgen skill-entropy knobs. Defaults reproduce historical behavior:
# 0-4 advancement draws/team, 1-2 skills/draw, primary categories only.
# Crank for developed-league rosters, e.g. 11 / 3 / 0.35.
skillup_max_players = 4
skillup_max_each = 2
skillup_secondary_pct = 0.0
# v5 path-actions (D82): 1 = the STEP square head selects ANY reachable
# destination; the env routes a min-risk path and auto-executes it, returning
# control on interruptions. 0 = v4 stepwise semantics (bit-identical).
macro_moves = 0
# Surfs: charged at the deterministic crowd-push event, dice-independent.
# Suggested when shaped: taken -0.1, inflicted +0.1 (zero-sum pair)
reward_surf_taken = 0.0
reward_surf_inflicted = 0.0
# --- Profile C: exposure-EV transfer + sequencing charge (D33) -------------
# Zero-sum transfer at every block/blitz DECLARATION, priced by the
# closed-form skill-transformed block tree (engine bb_blockev, validated by
# make blockev-mc + 12 unit tests): k_kd * P(def down) + k_value *
# P(def removed) * cost/100k + k_ball * P(ball dislodged). Dice outcomes
# carry no shaping. Spec values: k_kd 0.06 (routine 2d+Block ~ +0.03),
# k_value 0.5 (Wardancer-vs-MB ~ -0.08/block), k_ball 0.3. Per-step
# magnitude (panel-recomputed): a realistic strong case — 3d MB+Claws blitz
# on a 140k AV8 carrier — reaches ~0.5; the theoretical P=1 bound on a 140k
# victim is 1.06, at the clamp edge ALONE. No realistic step in this config
# exceeds the [-1,1] clamp (declaration and resolution rewards land on
# different decision steps), but budget any NEW knob against ~0.5/step.
reward_k_kd = 0.0
reward_k_value = 0.0
reward_k_self_injury = 0.0
reward_k_ball = 0.0
# Sequencing charge: k_seq * P(turnover of this block) * pending safe
# activations, charged to the acting team at declaration; exempt on the
# team's last turn of the half. Suggested 0.02 (10-pending worst case 0.2).
reward_k_seq = 0.0
# Net-EV turnover charge: k_turnover * ev.p_turnover (the BLOCK-DICE own-turnover
# prob), charged only to the acting team at declaration. NOTE: intentionally uses
# ev.p_turnover, NOT p_own_to (which folds in the blitz rush-fail turnover) — the
# rush-fail term is identical for 2d vs 2d-red and would dilute the dice-mix signal
# this charge exists to sharpen (D159 review F2). Do NOT "fix" it back to p_own_to.
# Additive to k_seq. Suggested 0.15 to make routine 2d blocks net-favorable while
# pricing 2d-red blocks by their much higher own-turnover risk.
reward_k_turnover = 0.0
# Demo-state reset curriculum (Backplay / chess fen_curric_pct pattern,
# docs/rl-best-practices.md hole #2): fraction of episodes that start from a
# banked FUMBBL mid-game state (resources/bloodbowl/state_bank.bbs — built by
# validation/build_state_bank.py, staged by tools/install_puffer_env.sh)
# instead of a procgen kickoff. Missing bank = plain procgen resets. Keep a
# held-out from-kickoff eval (pct 0) to watch critic distribution skew; keep
# 0 for holdout evals — banked states carry their FUMBBL rosters, so
# exclude/force_team are not enforced on demo episodes. Chess trains at 0.9.
demo_reset_pct = 0.0
# Holdout / fixed-matchup controls (-1 = off): exclude_team bars a team id
# from training draws; force_*_team pins a side for evaluation.
exclude_team = -1
force_home_team = -1
force_away_team = -1
# 1 = one side is the deterministic contact bot; the other side remains policy
# controlled. Intended first for absolute checkpoint evals, later pressure runs.
scripted_opponent = 0
# Scripted bot choice when scripted_opponent=1:
# 0 = contact bot, 1 = bashy cage-advance offense bot. Default 0 preserves evals.
scripted_opponent_type = 0
# Which side the scripted bot plays when scripted_opponent=1:
# 0 = HOME/team 0, 1 = AWAY/team 1. Default 1 preserves the original eval.
scripted_opponent_team = 1
max_decisions = 4096
# Spectator playback speed: decisions/sec when rendering (puffer eval).
render_fps = 60

[policy]
# Linear -> MinGRU x3 -> heads (docs/policy-research.md).
hidden_size = 512
num_layers = 3
expansion_factor = 1

[train]
gpus = 1
seed = 42
total_timesteps = 2_000_000_000
learning_rate = 0.0006
anneal_lr = 1
min_lr_ratio = 0.1
gamma = 0.995
gae_lambda = 0.85
replay_ratio = 0.25
clip_coef = 0.2
vf_coef = 1.0
vf_clip_coef = 0.5
max_grad_norm = 1.5
# Masked 454-way factored action space: keep exploration pressure high early.
ent_coef = 0.02
anneal_ent_coef = 1
min_ent_coef_ratio = 0.1
minibatch_size = 16384
horizon = 64
update_epochs = 1
# --- BC-regularized PPO (local torch_pufferl.py patch; D27) ---------------
# Auxiliary human-imitation masked CE added to every PPO minibatch loss so
# selfplay can't erode the human prior (AlphaStar-style anchor). Torch
# backend (--slowly) only; the native CUDA trainer ignores these keys.
# 0.0 = off (bit-identical to unpatched). Patch: training/torch_pufferl_bcreg.patch
bc_coef = 0.0
bc_pairs_dir = validation/pairs
bc_batch = 512
# 1 = cosine-decay bc_coef to 10% of its initial value over total_timesteps
bc_coef_anneal = 1
# Fraction of bc_coef the cosine anneal decays TO (0.1 = classic 10%% floor;
# 0 = full anchor release once the prior is absorbed — the D45 test).
bc_coef_floor = 0.1
# --- Asymmetric training (frozen enemy; D43 follow-up) --------------------
# Path to a torch state_dict played by the non-learner side (no grad, rows
# excluded from PPO; learner alternates home/away by env parity). Empty =
# symmetric mirror selfplay (upstream behavior). Breaks the co-evolving
# defense loop that makes possession futures net-negative.
frozen_enemy_path =

[sweep]
metric = perf
goal = maximize
max_runs = 16
gpus = 1
# Restrict the sweep to these 4 dims (substring match, sweep.py:157). WITHOUT this,
# PufferLib inherits default.ini's FULL [sweep.*] catalogue and also sweeps
# policy.hidden_size / num_layers / train.total_timesteps — which breaks warm-start
# AND match-mode (the warm-start ckpt + match enemy have FIXED arch 512/3).
# Validated on a live sweep 2026-06-16 (D131).
sweep_only = learning_rate, ent_coef, gae_lambda, gamma
# Match-mode scoring (chess.ini pattern): score each trial by win-rate vs a FIXED
# reference checkpoint, sidestepping the env/score deadlock (pufferl.py:394 hardcodes
# metrics['env/score'], which our binding never emits — a plain sweep hangs forever).
# Path is box-relative — set per box. 0/0 => match enemy reuses our policy arch (512/3).
# REQUIRES training/sweep_match_mode_exclusion.patch, else these match_* keys raise
# 'Param match_enemy_model_path is not a dict' (missing from sweep.py's skip-list).
match_enemy_model_path = 'training/league7b_cap.bin'
match_num_games = 1024
match_enemy_hidden_size = 0
match_enemy_num_layers = 0

[sweep.train.learning_rate]
distribution = log_normal
min = 0.0001
max = 0.003
scale = 0.5

[sweep.train.ent_coef]
distribution = log_normal
min = 0.005
max = 0.08
scale = auto

[sweep.train.gae_lambda]
distribution = uniform
min = 0.75
max = 0.97
scale = auto

# Discount horizon sweep (Alex, 2026-06-03): gamma 0.995 gives ~200-decision
# effective lookahead — borderline for multi-turn clock plans (a 4-turn
# dwarf scoring march is ~100-150 decisions; deep-reception setups push the
# edge). Sweep toward longer horizons; judge not only by perf but by the
# slow-team late-half scoring diagnostic (TD-by-turn split by team speed).
[sweep.train.gamma]
distribution = uniform
min = 0.995
max = 0.99975
scale = auto
