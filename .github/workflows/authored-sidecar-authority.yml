name: Authored sidecar authority

on:
  pull_request_target:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  immutable-history:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Resolve exact event authorities
        id: refs
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          MERGE_BASE: ${{ github.event.merge_group.base_sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
          EVENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          case "$EVENT_NAME" in
            pull_request_target)
              before="$PR_BASE"
              after="$PR_HEAD"
              ;;
            merge_group)
              before="$MERGE_BASE"
              after="$EVENT_SHA"
              ;;
            push)
              before="$PUSH_BEFORE"
              after="$PUSH_AFTER"
              test "$before" != "0000000000000000000000000000000000000000"
              ;;
            *)
              exit 2
              ;;
          esac
          test -n "$before"
          test -n "$after"
          echo "before=$before" >> "$GITHUB_OUTPUT"
          echo "after=$after" >> "$GITHUB_OUTPUT"

      - name: Checkout complete candidate history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ steps.refs.outputs.after }}

      - name: Fetch exact authority objects
        env:
          BEFORE: ${{ steps.refs.outputs.before }}
          AFTER: ${{ steps.refs.outputs.after }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "$BEFORE"
          git cat-file -e "$BEFORE^{commit}"
          git cat-file -e "$AFTER^{commit}"
          git merge-base --is-ancestor "$BEFORE" "$AFTER"

      - name: Extract trusted authority
        id: authority
        env:
          BEFORE: ${{ steps.refs.outputs.before }}
          AFTER: ${{ steps.refs.outputs.after }}
        run: |
          set -euo pipefail
          authority_sha="$BEFORE"
          bootstrap=false
          if ! git cat-file -e \
              "$BEFORE:tools/authored_sidecar_oracle.json" 2>/dev/null; then
            authority_sha="$AFTER"
            bootstrap=true
          fi
          git worktree add --detach /tmp/authored-sidecar-authority "$authority_sha"
          test -f /tmp/authored-sidecar-authority/tools/authored_sidecar_oracle.json
          echo "bootstrap=$bootstrap" >> "$GITHUB_OUTPUT"

      - name: Pull pinned tokenless verifier image
        env:
          VERIFIER_IMAGE: >-
            silkeh/clang@sha256:9388794775d1393c16b6897b4775b6d3e29459319de0bfafec59a20262e1fa68
        run: |
          set -euo pipefail
          docker pull "$VERIFIER_IMAGE"
          docker image inspect "$VERIFIER_IMAGE" >/dev/null

      - name: Verify every newly reachable commit
        env:
          BEFORE: ${{ steps.refs.outputs.before }}
          AFTER: ${{ steps.refs.outputs.after }}
          BOOTSTRAP: ${{ steps.authority.outputs.bootstrap }}
        run: |
          set -euo pipefail
          bootstrap_arg=()
          if test "$BOOTSTRAP" = true; then
            bootstrap_arg=(--bootstrap)
          fi
          python3 \
            /tmp/authored-sidecar-authority/tools/authored_sidecar_authority/verify_history.py \
            "$GITHUB_WORKSPACE" /tmp/authored-sidecar-authority \
            --before "$BEFORE" --after "$AFTER" \
            --container-runtime docker "${bootstrap_arg[@]}"
