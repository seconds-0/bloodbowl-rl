name: CI
on:
  push: {branches: [main]}
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          pip install pyyaml numpy
          pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Codegen up to date
        run: python3 tools/codegen.py --check
      - name: Reward, replay, and analyzer contracts
        run: |
          PYTHONPATH=tools python3 -m unittest \
            tools.test_analyze_reward_candidate_transfer \
            tools.test_analyze_reward_learning_curve \
            tools.test_analyze_reward_screen \
            tools.test_analyze_reward_transfer \
            tools.test_bbp_behavior_audit \
            tools.test_experiment_contracts \
            tools.test_experiment_queue \
            tools.test_game_stats \
            tools.test_human_possession \
            tools.test_filter_state_bank \
            tools.test_report_scenario_coverage \
            tools.test_replay_corpus_audit \
            tools.test_reward_manifest \
            tools.test_run_reward_candidate_transfer \
            tools.test_freeze_vacation_queue \
            tools.test_freeze_vacation_overflow \
            tools.test_run_frozen_reward_screen \
            tools.test_run_checkpoint_milestone_eval \
            tools.test_run_reward_learned_transfer \
            tools.test_start_vacation_overflow \
            tools.test_validate_primary_queue_completion \
            tools.test_vacation_reward_gate
          for manifest in puffer/config/rewards/*.json; do
            python3 tools/reward_manifest.py "$manifest" --json >/dev/null
          done
          bash -n \
            tools/install_puffer_env.sh \
            tools/run_reward_ablation.sh \
            tools/run_reward_screen.sh
      - name: BC corpus filtering and bounded streaming
        run: |
          PYTHONPATH=training python3 -m unittest \
            training.test_bc_pretrain_filter \
            training.test_bc_pretrain_streaming
      - name: Build + unit tests
        run: make test
      - name: Authored sidecar bootstrap authority
        run: make authored-sidecar-authority-verify
      - name: ASan/UBSan tests
        run: make asan
  # nightly job (long fuzz, replay differential, chi-square) added in Phase 4
